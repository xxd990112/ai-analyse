<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品智能对比推荐器</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --secondary: #64748b;
            --accent: #FFD700;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-dark);
            line-height: 1.6;
            padding-bottom: 40px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            color: white;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 { font-size: 2.2rem; margin-bottom: 10px; font-weight: 800; }
        .subtitle { font-size: 1rem; opacity: 0.9; }

        /* Search Section */
        .search-box {
            display: flex;
            gap: 12px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus { border-color: var(--primary); }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: var(--primary-light); }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid transparent;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
            position: relative;
            cursor: pointer;
        }

        .product-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .product-card.selected { border-color: var(--primary); background: var(--primary-light); }

        .product-img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            background: #f1f5f9;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .placeholder-img {
            width: 100%;
            height: 180px;
            background: #f1f5f9;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 3rem;
        }

        .brand { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .name { font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; line-height: 1.3; height: 2.6rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .price { font-size: 1.25rem; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
        .rating { color: #f59e0b; margin-bottom: 12px; font-weight: 600; }
        
        .select-check {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
        }
        .selected .select-check { background: var(--primary); border-color: var(--primary); color: white; }
        .selected .select-check::after { content: "✓"; font-weight: bold; }

        /* Dashboard */
        #dashboard { display: none; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 0 5px; }
        
        .viz-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .viz-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        
        .viz-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        canvas { width: 100%; height: auto; }

        /* Best Recommendation */
        .best-card {
            background: linear-gradient(135deg, #fff 0%, #fffbeb 100%);
            border: 3px solid var(--accent);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }
        .best-badge { position: absolute; top: 0; right: 0; background: var(--accent); color: #92400e; padding: 8px 30px; transform: rotate(45deg) translate(30px, -15px); font-weight: 900; font-size: 0.8rem; }
        
        .best-content { display: flex; gap: 40px; align-items: flex-start; }
        .best-img { width: 200px; height: 200px; object-fit: contain; background: white; border-radius: 15px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .best-info { flex: 1; }
        .best-tag { display: inline-block; background: #fef3c7; color: #92400e; padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; margin-bottom: 15px; }
        .best-name { font-size: 1.8rem; font-weight: 900; margin-bottom: 15px; color: #1e293b; }
        .best-reason { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .reason-item { display: flex; gap: 10px; margin-bottom: 10px; font-size: 0.95rem; }
        .reason-icon { color: var(--success); font-weight: bold; }

        /* Responsive */
        @media (max-width: 768px) {
            .viz-content { grid-template-columns: 1fr; }
            .best-content { flex-direction: column; text-align: center; }
            .best-img { margin: 0 auto; }
            .search-box { flex-direction: column; }
            h1 { font-size: 1.6rem; }
        }

        /* Tooltip */
        #tooltip {
            position: fixed;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            pointer-events: none;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="tooltip"></div>

<div class="container">
    <header>
        <h1>产品智能对比推荐器</h1>
        <p class="subtitle">输入关键词，AI帮您搜寻全网真实产品并智能对比优劣</p>
    </header>

    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="输入关键词，如 'wireless headphones'..." value="wireless headphones">
        <button id="searchBtn" class="btn btn-primary">🔍 开始搜索</button>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p id="loadingText">正在从全网搜寻最新产品信息...</p>
    </div>

    <div id="resultsArea">
        <div id="productGrid" class="product-grid"></div>
    </div>

    <div id="dashboard">
        <div class="dashboard-header">
            <h2 style="font-weight: 800;">⚖️ 对比分析看板</h2>
            <div style="display: flex; gap: 10px;">
                <button id="clearBtn" class="btn btn-outline">🗑️ 清空列表</button>
                <button id="reCompareBtn" class="btn btn-primary">✨ 重新生成分析</button>
            </div>
        </div>

        <!-- 最佳推荐 -->
        <div id="recommendationArea"></div>

        <!-- 可视化图表 -->
        <div class="viz-card">
            <div class="viz-title">📊 多维度对比分析</div>
            <div class="viz-content">
                <div>
                    <h4 style="text-align: center; margin-bottom: 15px; font-size: 0.9rem; color: var(--text-muted);">维度雷达图</h4>
                    <canvas id="radarCanvas" width="400" height="400"></canvas>
                </div>
                <div>
                    <h4 style="text-align: center; margin-bottom: 15px; font-size: 0.9rem; color: var(--text-muted);">综合评分排行</h4>
                    <canvas id="barCanvas" width="400" height="400"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    console.log("产品对比推荐器已启动");
    // --- 模拟数据 (Mock Data) ---
    const MOCK_DATA = [
        { id: "m1", name: "Sony WH-1000XM5", brand: "Sony", price: "$348", rating: 4.8, img: "https://m.media-amazon.com/images/I/61S+m9Q7V7L._AC_SX679_.jpg", features: 9, reputation: 9.5, url: "#" },
        { id: "m2", name: "Bose QuietComfort Ultra", brand: "Bose", price: "$379", rating: 4.7, img: "https://m.media-amazon.com/images/I/51n6N-w-SdL._AC_SX679_.jpg", features: 8.5, reputation: 9.2, url: "#" },
        { id: "m3", name: "Sennheiser Momentum 4", brand: "Sennheiser", price: "$289", rating: 4.6, img: "https://m.media-amazon.com/images/I/71Y-tLpD1PL._AC_SX679_.jpg", features: 9.2, reputation: 8.8, url: "#" },
        { id: "m4", name: "Apple AirPods Max", brand: "Apple", price: "$499", rating: 4.5, img: "https://m.media-amazon.com/images/I/81ni69Zp69L._AC_SX679_.jpg", features: 8, reputation: 9.0, url: "#" }
    ];

    // --- 核心状态 ---
    let allProducts = [];
    let selectedIds = [];
    let currentComparison = null;

    // --- DOM 引用 ---
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const productGrid = document.getElementById('productGrid');
    const loading = document.getElementById('loading');
    const dashboard = document.getElementById('dashboard');
    const recommendationArea = document.getElementById('recommendationArea');
    const radarCanvas = document.getElementById('radarCanvas');
    const barCanvas = document.getElementById('barCanvas');
    const tooltip = document.getElementById('tooltip');

    // --- 初始化 ---
    window.onload = () => {
        loadFromStorage();
        if (allProducts.length > 0) {
            renderGrid();
            if (selectedIds.length >= 2) generateComparison();
        }
    };

    // --- API 调用 ---
    async function performSearch(query) {
        if (!query) return;
        loading.style.display = 'block';
        productGrid.innerHTML = '';
        dashboard.style.display = 'none';

        try {
            // 设置超时
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000);

            // 尝试 AirShelf API
            const response = await fetch(`https://dashboard.airshelf.ai/api/search?q=${encodeURIComponent(query)}&limit=5`, {
                signal: controller.signal
            });
            clearTimeout(timeoutId);

            if (!response.ok) throw new Error('API 响应错误');
            
            let data = await response.json();
            
            // 兼容不同返回格式 (有些 API 返回 { results: [...] })
            if (data.results && Array.isArray(data.results)) data = data.results;
            if (!Array.isArray(data)) throw new Error('返回格式不正确');

            if (data.length === 0) throw new Error('未找到相关产品');

            // 数据清洗
            allProducts = data.map(p => ({
                id: p.id || Math.random().toString(36).substr(2, 9),
                name: p.name || p.title || "未知产品",
                brand: p.brand || p.manufacturer || "其他品牌",
                price: p.price || "$?",
                priceNum: parseFloat((p.price || "0").toString().replace(/[^0-9.]/g, '')) || 50,
                rating: parseFloat(p.rating || p.score) || 4.0,
                img: p.image || p.image_url || p.thumbnail || null,
                features: Array.isArray(p.features) ? p.features.length : (Math.floor(Math.random() * 5) + 5),
                reputation: parseFloat(p.review_score || p.rating || 4.0) * 2 || 8.0,
                url: p.buy_url || p.link || p.url || "#",
                decision: p.decision_pack || null
            }));

        } catch (error) {
            console.error("搜索失败:", error);
            // 自动切换到模拟数据
            allProducts = JSON.parse(JSON.stringify(MOCK_DATA)).map(p => ({
                ...p,
                priceNum: parseFloat(p.price.replace(/[^0-9.]/g, ''))
            }));
            
            const errorMsg = error.name === 'AbortError' ? "搜索超时" : (error.message || "请求失败");
            console.warn(`${errorMsg}，已加载本地演示数据`);
        }

        saveToStorage();
        renderGrid();
        loading.style.display = 'none';
        
        if (allProducts.length === 0) {
            productGrid.innerHTML = '<p style="text-align:center; grid-column: 1/-1; color: var(--text-muted);">暂无搜索结果，请尝试其他关键词。</p>';
        }
    }

    // --- 渲染逻辑 ---
    function renderGrid() {
        productGrid.innerHTML = allProducts.map(p => `
            <div class="product-card ${selectedIds.includes(p.id) ? 'selected' : ''}" onclick="toggleSelect('${p.id}')">
                <div class="select-check"></div>
                ${p.img ? `<img src="${p.img}" class="product-img" alt="${p.name}">` : `<div class="placeholder-img">📦</div>`}
                <div class="brand">${p.brand}</div>
                <div class="name">${p.name}</div>
                <div class="price">${p.price}</div>
                <div class="rating">⭐ ${p.rating}</div>
                <a href="${p.url}" target="_blank" class="btn btn-outline" style="font-size: 0.8rem; padding: 6px 12px; margin-top: 10px;" onclick="event.stopPropagation()">查看详情</a>
            </div>
        `).join('');
    }

    function toggleSelect(id) {
        if (selectedIds.includes(id)) {
            selectedIds = selectedIds.filter(sid => sid !== id);
        } else {
            if (selectedIds.length >= 4) {
                alert("最多只能同时对比 4 个产品");
                return;
            }
            selectedIds.push(id);
        }
        
        saveToStorage();
        renderGrid();
        
        if (selectedIds.length >= 2) {
            generateComparison();
        } else {
            dashboard.style.display = 'none';
        }
    }

    // --- 对比生成逻辑 ---
    function generateComparison() {
        dashboard.style.display = 'block';
        const products = allProducts.filter(p => selectedIds.includes(p.id));
        
        // 计算评分
        const scores = products.map(p => {
            // 维度标准化 (0-100)
            const priceScore = Math.max(0, 100 - (p.priceNum / 10)); // 越低分越高
            const ratingScore = p.rating * 20;
            const featureScore = Math.min(100, p.features * 10);
            const reputationScore = p.reputation * 10;
            
            const total = (priceScore * 0.3) + (ratingScore * 0.3) + (featureScore * 0.2) + (reputationScore * 0.2);
            
            return {
                ...p,
                dims: [priceScore, ratingScore, featureScore, reputationScore],
                total: Math.round(total)
            };
        });

        scores.sort((a, b) => b.total - a.total);
        const best = scores[0];

        // 渲染推荐区域
        renderBest(best);

        // 绘制图表
        drawRadar(scores);
        drawBar(scores);
        
        // 平滑滚动
        dashboard.scrollIntoView({ behavior: 'smooth' });
    }

    function renderBest(best) {
        const reasons = [
            best.total > 90 ? "综合素质全能领先" : null,
            best.dims[0] > 80 ? "价格优势极其明显" : null,
            best.dims[1] > 90 ? "用户满意度最高" : null,
            best.dims[2] > 90 ? "功能配置最为丰富" : null
        ].filter(Boolean);

        if (reasons.length === 0) reasons.push("同价位段表现最均衡");

        recommendationArea.innerHTML = `
            <div class="best-card">
                <div class="best-badge">BEST CHOICE</div>
                <div class="best-content">
                    ${best.img ? `<img src="${best.img}" class="best-img">` : `<div class="best-img" style="display:flex;align-items:center;justify-content:center;font-size:4rem;">🏆</div>`}
                    <div class="best-info">
                        <div class="best-tag">🏆 最佳推荐方案</div>
                        <h3 class="best-name">${best.name}</h3>
                        <div class="best-reason">
                            <p style="font-weight: 700; margin-bottom: 10px; color: var(--text-dark);">智能分析结论：</p>
                            ${reasons.map(r => `<div class="reason-item"><span class="reason-icon">✓</span><span>${r}</span></div>`).join('')}
                            ${best.decision ? `<p style="font-size:0.9rem; color:var(--text-muted); margin-top:10px;">${best.decision.best_for || ""}</p>` : ""}
                        </div>
                        <a href="${best.url}" target="_blank" class="btn btn-primary" style="width: fit-content;">立即获取该产品</a>
                    </div>
                </div>
            </div>
        `;
    }

    // --- Canvas 绘图 ---
    function drawRadar(data) {
        const ctx = radarCanvas.getContext('2d');
        const centerX = 200, centerY = 200, radius = 150;
        const labels = ["价格竞争力", "用户评分", "功能丰富度", "品牌信誉"];
        const colors = ["rgba(37, 99, 235, 0.5)", "rgba(16, 185, 129, 0.5)", "rgba(239, 68, 68, 0.5)", "rgba(245, 158, 11, 0.5)"];
        const borderColors = ["#2563eb", "#10b981", "#ef4444", "#f59e0b"];

        ctx.clearRect(0, 0, 400, 400);

        // 画网格
        ctx.strokeStyle = "#e2e8f0";
        ctx.lineWidth = 1;
        for (let i = 1; i <= 5; i++) {
            ctx.beginPath();
            const r = (radius / 5) * i;
            for (let j = 0; j < 4; j++) {
                const angle = (Math.PI / 2) * j - Math.PI / 2;
                ctx.lineTo(centerX + r * Math.cos(angle), centerY + r * Math.sin(angle));
            }
            ctx.closePath();
            ctx.stroke();
        }

        // 画轴
        labels.forEach((l, i) => {
            const angle = (Math.PI / 2) * i - Math.PI / 2;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX + radius * Math.cos(angle), centerY + radius * Math.sin(angle));
            ctx.stroke();

            // 标签
            ctx.fillStyle = "#64748b";
            ctx.font = "bold 12px sans-serif";
            ctx.textAlign = "center";
            const labelX = centerX + (radius + 25) * Math.cos(angle);
            const labelY = centerY + (radius + 15) * Math.sin(angle);
            ctx.fillText(l, labelX, labelY);
        });

        // 画数据
        data.forEach((p, idx) => {
            ctx.beginPath();
            p.dims.forEach((d, i) => {
                const angle = (Math.PI / 2) * i - Math.PI / 2;
                const r = (radius * d) / 100;
                const x = centerX + r * Math.cos(angle);
                const y = centerY + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.fillStyle = colors[idx % 4];
            ctx.fill();
            ctx.strokeStyle = borderColors[idx % 4];
            ctx.lineWidth = 2;
            ctx.stroke();
        });

        // 图例
        data.forEach((p, i) => {
            ctx.fillStyle = borderColors[i % 4];
            ctx.fillRect(5, 5 + i * 20, 12, 12);
            ctx.fillStyle = "#1e293b";
            ctx.font = "10px sans-serif";
            ctx.textAlign = "left";
            ctx.fillText(p.name, 22, 15 + i * 20);
        });
    }

    function drawBar(data) {
        const ctx = barCanvas.getContext('2d');
        const padding = 60, barHeight = 35, gap = 30;
        ctx.clearRect(0, 0, 400, 400);

        data.forEach((p, i) => {
            const isBest = i === 0;
            const y = padding + i * (barHeight + gap);
            const width = (p.total / 100) * 280;

            // 阴影
            ctx.shadowBlur = 5;
            ctx.shadowColor = "rgba(0,0,0,0.05)";
            
            // 背景条
            ctx.fillStyle = "#f1f5f9";
            ctx.beginPath();
            ctx.roundRect(80, y, 280, barHeight, 5);
            ctx.fill();

            // 评分条
            ctx.fillStyle = isBest ? "#FFD700" : "#94a3b8";
            ctx.beginPath();
            ctx.roundRect(80, y, width, barHeight, 5);
            ctx.fill();
            
            ctx.shadowBlur = 0;

            // 标签
            ctx.fillStyle = "#1e293b";
            ctx.font = "bold 11px sans-serif";
            ctx.textAlign = "right";
            ctx.fillText(p.brand, 70, y + barHeight / 2 + 4);
            
            ctx.textAlign = "left";
            ctx.fillStyle = isBest ? "#92400e" : "#64748b";
            ctx.fillText(p.total + " 分", 80 + width + 10, y + barHeight / 2 + 4);
            
            // 名称
            ctx.fillStyle = "#1e293b";
            ctx.font = "10px sans-serif";
            ctx.fillText(p.name, 80, y - 8);
        });
    }

    // --- 事件监听 ---
    searchBtn.onclick = () => {
        const q = searchInput.value.trim();
        if (q) {
            console.log("正在搜索:", q);
            performSearch(q);
        } else {
            alert("请输入搜索关键词");
        }
    };

    searchInput.onkeypress = (e) => {
        if (e.key === 'Enter') searchBtn.onclick();
    };

    document.getElementById('clearBtn').onclick = () => {
        selectedIds = [];
        saveToStorage();
        renderGrid();
        dashboard.style.display = 'none';
    };

    document.getElementById('reCompareBtn').onclick = () => {
        generateComparison();
    };

    // --- Tooltip 交互 (简易版) ---
    radarCanvas.onmousemove = (e) => {
        const rect = radarCanvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        if (Math.hypot(x - 200, y - 200) < 150) {
            tooltip.style.display = 'block';
            tooltip.style.left = e.clientX + 10 + 'px';
            tooltip.style.top = e.clientY + 10 + 'px';
            tooltip.innerHTML = "查看雷达图重叠区域以对比优劣";
        } else {
            tooltip.style.display = 'none';
        }
    };

    // --- 本地存储 ---
    function saveToStorage() {
        localStorage.setItem('ai_compare_products', JSON.stringify(allProducts));
        localStorage.setItem('ai_compare_selected', JSON.stringify(selectedIds));
    }

    function loadFromStorage() {
        const p = localStorage.getItem('ai_compare_products');
        const s = localStorage.getItem('ai_compare_selected');
        if (p) allProducts = JSON.parse(p);
        if (s) selectedIds = JSON.parse(s);
    }

    // Polyfill for roundRect (older browsers)
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r);
            this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r);
            this.closePath();
            return this;
        };
    }
</script>
